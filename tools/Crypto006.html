                        tech: { env: "Hostil / Piratería", level: "NATO Unclassified", risk: "Rastreo de Buques", algorithm: "TLS 1.2 / AIS-SART", hw: "Router Seguro COTS", keyMgmt: "Certs basados en Web", protocol: "AIS-SART Seguro", antijam: "Ninguno" }
                    },
                    {
                        id: 14,
                        title: "Sincronización Guerra de Minas",
                        scenario: "Cazaminas compartiendo mapas de sonar en tiempo real de campos de minas detectados con el resto del grupo de tareas para asegurar el paso seguro.",
                        doctrine: "Prioriza la Integridad y Precisión de los Datos. La configuración CIS asegura que las imágenes tácticas submarinas se compartan sin corrupción, lo cual es crítico para la seguridad de la flota en zonas minadas.",
                        tech: { env: "Hostil / Minado", level: "NATO Secret", risk: "Sabotaje Táctico", algorithm: "AES-256-CTR", hw: "Codificador SITOPP", keyMgmt: "Específico de Misión", protocol: "STANAG 4285", antijam: "Filtrado Adaptativo" }
                    },
                    {
                        id: 15,
                        title: "Actualización SW Tierra-Buque",
                        scenario: "Transferencia a gran escala de parches de software del sistema de combate y firmas de inteligencia desde un centro de mantenimiento en tierra.",
                        doctrine: "Se adhiere al marco de Ciclo de Vida de CIS y Ciberseguridad. Asegura la integridad de la cadena de suministro de software mediante autenticación fuerte y transporte cifrado de código crítico para la misión.",
                        tech: { env: "No Hostil / Muelle", level: "NATO Restricted", risk: "Inyección de Malware", algorithm: "RSA-4096 / SHA-512", hw: "KG-175F", keyMgmt: "Tarjeta Inteligente / CAC", protocol: "STANAG 4538", antijam: "ALE 3G" }
                    },
                    {
                        id: 16,
                        title: "Reabastecimiento en el Mar (RAS)",
                        scenario: "Coordinación de maniobras de alta precisión para el trasvase de combustible y víveres entre un petrolero y un destructor en una zona de alta amenaza asimétrica.",
                        doctrine: "Asegura la Coordinación Táctica en estados vulnerables. Se utilizan enlaces DAMA de alta disponibilidad para gestionar la maniobra mientras se mantiene una burbuja criptográfica segura para evitar el monitoreo.",
                        tech: { env: "Hostil / Vulnerable", level: "NATO Restricted", risk: "Ataque Asimétrico", algorithm: "Twofish / AES", hw: "KY-99 ANDVT", keyMgmt: "OTAD", protocol: "STANAG 4249", antijam: "Asignación de Intervalos de Tiempo" }
                    }
                ]
            }
        };

        function render() {
            const container = document.getElementById('use-cases-container');
            const langData = data[currentLang];
            const labels = langData.labels;

            document.getElementById('lang-btn').innerText = langData.langBtn;
            document.getElementById('label-excel').innerText = langData.excelBtn;
            document.getElementById('copy-toast').innerText = langData.copyMsg;

            container.innerHTML = '';

            langData.cases.forEach(c => {
                const card = document.createElement('div');
                card.className = 'glass-card p-8 animate-in fade-in duration-500 flex flex-col gap-6 shadow-2xl';
                
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-white/10 pb-4">
                        <div class="flex items-center gap-3">
                            <span class="bg-amber-500 text-bg-dark font-black px-3 py-1 rounded-lg text-sm">${labels.id} ${c.id}</span>
                            <h2 class="text-xl font-bold text-white">${c.title}</h2>
                        </div>
                        <button onclick="copySingle(${c.id})" class="text-slate-500 hover:text-cyan-400 transition">
                            <i data-lucide="copy" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <span class="section-label"><i data-lucide="map"></i> ${labels.scenario}</span>
                            <p class="text-slate-300 leading-relaxed text-sm">${c.scenario}</p>
                        </div>

                        <div class="doctrinal-box">
                            <span class="section-label"><i data-lucide="book-open"></i> ${labels.doctrine}</span>
                            <p class="text-amber-200/90 text-sm italic font-light">"${c.doctrine}"</p>
                        </div>

                        <div>
                            <span class="section-label"><i data-lucide="layout-grid"></i> ${labels.technical}</span>
                            <table class="excel-table">
                                <thead>
                                    <tr><th>${labels.property}</th><th>${labels.value}</th></tr>
                                </thead>
                                <tbody>
                                    ${Object.entries(c.tech).map(([k, v]) => `
                                        <tr>
                                            <td class="capitalize text-slate-400">${k.replace(/([A-Z])/g, ' $1')}</td>
                                            <td class="${['algorithm','hw'].includes(k) ? 'mono text-cyan-400 font-bold' : 'text-white'}">${v}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            render();
        }

        function showToast() {
            const toast = document.getElementById('copy-toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function copySingle(id) {
            const c = data[currentLang].cases.find(x => x.id === id);
            const l = data[currentLang].labels;
            let text = `${l.id} ${c.id}: ${c.title}\n\n`;
            text += `${l.scenario}\n${c.scenario}\n\n`;
            text += `${l.doctrine}\n${c.doctrine}\n\n`;
            text += `${l.technical}\n`;
            text += `${l.property}\t${l.value}\n`;
            Object.entries(c.tech).forEach(([k, v]) => {
                text += `${k}\t${v}\n`;
            });
            
            navigator.clipboard.writeText(text);
            showToast();
        }

        function copyGlobal() {
            const langData = data[currentLang];
            const l = langData.labels;
            let text = `${l.id}\tTitle\tScenario\tDoctrine\tEnv\tLevel\tRisk\tAlgorithm\tHW\tKeyMgmt\tProtocol\n`;
            
            langData.cases.forEach(c => {
                text += `${c.id}\t${c.title}\t${c.scenario}\t${c.doctrine}\t${c.tech.env}\t${c.tech.level}\t${c.tech.risk}\t${c.tech.algorithm}\t${c.tech.hw}\t${c.tech.keyMgmt}\t${c.tech.protocol}\n`;
            });

            navigator.clipboard.writeText(text);
            showToast();
        }

        window.onload = render;
    </script>
</body>
</html>
